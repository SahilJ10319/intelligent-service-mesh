# Application Identity
spring.application.name=neuragate-mesh
server.port=8080

# Virtual Threads - using Project Loom for high concurrency
spring.threads.virtual.enabled=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Resilience4j Circuit Breaker defaults
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.sliding-window-size=10

# Resilience4j Retry defaults
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=500ms

# Spring Cloud Gateway Routes
spring.cloud.gateway.routes[0].id=httpbin-get
spring.cloud.gateway.routes[0].uri=http://httpbin.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/get
spring.cloud.gateway.routes[0].filters[0]=AddRequestHeader=X-Gateway, NeuraGate

spring.cloud.gateway.routes[1].id=httpbin-post
spring.cloud.gateway.routes[1].uri=http://httpbin.org
spring.cloud.gateway.routes[1].predicates[0]=Path=/post
